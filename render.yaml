services:
  - type: web
    name: openclaw
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    plan: standard
    region: singapore
    envVars:
      - key: PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENCLAW_ALLOWED_ORIGINS
        sync: false
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
